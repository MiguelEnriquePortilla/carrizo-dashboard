<html lang="es">

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3350;
  --text: #e8eaf2;
  --muted: #6b7280;
  --accent: #6366f1;
  --accent-dim: rgba(99,102,241,0.12);
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --orange: #f97316;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; min-height:100vh; }

/* HEADER */
.hdr { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:100; backdrop-filter:blur(8px); }
.hdr-left { display:flex; flex-direction:column; gap:2px; }
.hdr-tag { font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
.hdr-title { font-size:18px; font-weight:700; color:var(--text); }
.hdr-date { font-family:var(--mono); font-size:11px; color:var(--muted); }

/* KPI BAR */
.kpi-bar { display:flex; gap:12px; flex-wrap:wrap; padding:12px 24px; background:var(--surface); border-bottom:1px solid var(--border); }
.kpi { display:flex; flex-direction:column; gap:2px; padding:10px 16px; background:var(--surface2); border-radius:8px; border:1px solid var(--border); min-width:140px; }
.kpi-label { font-size:10px; font-family:var(--mono); color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.kpi-val { font-family:var(--mono); font-size:22px; font-weight:600; }
.kpi-meta { font-size:10px; color:var(--muted); font-family:var(--mono); }

/* FILTER BAR */
.filter-bar { padding:12px 24px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; border-bottom:1px solid var(--border); background:var(--bg); }
.filter-label { font-size:11px; font-family:var(--mono); color:var(--muted); letter-spacing:1px; }
.filter-btn { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:var(--mono); font-size:11px; cursor:pointer; transition:all .15s; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.progress-summary { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted); }
.progress-summary b { color:var(--green); }

/* MAIN TABLE */
.main { padding:20px 24px; }
.section-title { font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; padding-left:4px; display:flex; align-items:center; gap:10px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.prio-block { margin-bottom:24px; }
.prio-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.prio-badge { font-family:var(--mono); font-size:10px; font-weight:600; padding:3px 10px; border-radius:4px; letter-spacing:1px; }
.prio-badge.P1 { background:rgba(239,68,68,.15); color:#ef4444; border:1px solid rgba(239,68,68,.3); }
.prio-badge.P2 { background:rgba(249,115,22,.15); color:#f97316; border:1px solid rgba(249,115,22,.3); }
.prio-badge.P3 { background:rgba(245,158,11,.15); color:#f59e0b; border:1px solid rgba(245,158,11,.3); }
.prio-badge.P4 { background:rgba(34,197,94,.15); color:#22c55e; border:1px solid rgba(34,197,94,.3); }
.prio-desc { font-size:11px; color:var(--muted); }
.prio-count { font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:auto; }

table { width:100%; border-collapse:collapse; }
thead tr { border-bottom:1px solid var(--border); }
th { font-family:var(--mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); padding:8px 12px; text-align:left; font-weight:500; }
tbody tr { border-bottom:1px solid rgba(46,51,80,.5); transition:background .1s; }
tbody tr:hover { background:var(--accent-dim); }
tbody tr.done { opacity:.45; }
tbody tr.done td.td-name { text-decoration:line-through; color:var(--muted); }
td { padding:10px 12px; vertical-align:middle; }
.td-name { font-weight:500; font-size:13px; }
.td-saldo { font-family:var(--mono); font-size:12px; color:#a5b4fc; }
.td-mora { font-family:var(--mono); font-size:12px; color:var(--muted); }

.tag { display:inline-block; padding:2px 8px; border-radius:4px; font-family:var(--mono); font-size:10px; font-weight:500; white-space:nowrap; }
.tag-hoy { background:rgba(34,197,94,.15); color:#22c55e; border:1px solid rgba(34,197,94,.3); }
.tag-rota { background:rgba(239,68,68,.15); color:#ef4444; border:1px solid rgba(239,68,68,.3); }
.tag-si { background:rgba(99,102,241,.15); color:#a5b4fc; border:1px solid rgba(99,102,241,.3); }
.tag-no { background:rgba(107,114,128,.1); color:var(--muted); border:1px solid var(--border); }
.tag-mora { background:rgba(249,115,22,.1); color:#f97316; border:1px solid rgba(249,115,22,.3); }

/* VISIT CELL */
.visit-cell { display:flex; align-items:center; gap:8px; }
.chk { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
.result-input { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--sans); font-size:12px; padding:4px 10px; width:180px; transition:border .15s; }
.result-input:focus { outline:none; border-color:var(--accent); }
.result-input::placeholder { color:var(--muted); }
.ts-label { font-family:var(--mono); font-size:10px; color:var(--muted); white-space:nowrap; }

/* EMPTY */
.empty { text-align:center; padding:40px; color:var(--muted); font-family:var(--mono); font-size:12px; }

/* FOOTER */
footer { text-align:center; padding:24px; font-family:var(--mono); font-size:10px; color:var(--muted); border-top:1px solid var(--border); letter-spacing:1px; }

@media(max-width:700px) {
  .kpi-bar { padding:10px 16px; gap:8px; }
  .main { padding:16px; }
  th:nth-child(3), td:nth-child(3) { display:none; }
  .result-input { width:120px; }
}
</style>
</head>

function actualizarProgreso() {

function tagSub(sub) {

  if (sub === 'ROTA')        return '<span class="tag tag-rota">⚠ ROTA</span>';
  if (sub.endsWith('d'))     return `<span class="tag tag-mora">${sub}</span>`;
  return '';
}

function tagPromesa(p) {
  if (p === 'ROTA') return '<span class="tag tag-rota">ROTA</span>';
  if (p === 'SI')   return '<span class="tag tag-si">✓ Promesa</span>';
  return '<span class="tag tag-no">Sin promesa</span>';
}

function renderTabla(datos) {
  if (!datos.length) return '<p class="empty">Sin cuentas en este rango</p>';
  return `<table>
    <thead><tr>
      <th>Cliente</th><th>Saldo</th><th>Mora</th><th>Estado</th><th>Visitado / Resultado</th>
    </tr></thead>
    <tbody>
      ${datos.map(r => {
        const s = estado[r.id] || {};
        const done = s.visitado ? 'done' : '';
        const chk  = s.visitado ? 'checked' : '';
        const res  = s.resultado || '';
        const ts   = s.timestamp ? `<span class="ts-label">${s.timestamp}</span>` : '';
        return `<tr class="${done}" id="row-${r.id}">
          <td class="td-name">${r.nombre}</td>
          <td class="td-saldo">$${r.saldo.toLocaleString('es-MX',{minimumFractionDigits:0})}</td>

          <td>${tagSub(r.sub)} ${tagPromesa(r.promesa)}</td>

                onchange="toggleVisita(${r.id}, this.checked)">
              <input type="text" class="result-input" placeholder="Resultado..."

              ${ts}
            </div>
          </td>
        </tr>`;

  if (row) row.className = checked ? 'done' : '';
  const tsEl = row?.querySelector('.ts-label');
  if (tsEl) tsEl.textContent = checked ? estado[id].timestamp : '';
  guardar();
}

function guardarResultado(id, valor) {
  if (!estado[id]) estado[id] = {};
  estado[id].resultado = valor;
  guardar();
}

function filtrar(gestor) {
  filtroActual = gestor;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function renderAll() {
  const filtered = filtroActual === 'todos'
    ? DATA
    : DATA.filter(r => r.gestor.toLowerCase().includes(filtroActual));

  const prios = ['P1','P2','P3','P4'];
  let html = '';
  prios.forEach(p => {
    const grupo = filtered.filter(r => r.prioridad === p);
    if (!grupo.length) return;
    const total = grupo.reduce((s,r) => s + r.saldo, 0);
    const cfg = PRIO_CFG[p];
    html += `<div class="prio-block">
      <div class="prio-header">
        <span class="prio-badge ${cfg.cls}">${p}</span>
        <span style="font-weight:600;font-size:13px">${cfg.label.split('—')[1].trim()}</span>
        <span class="prio-desc">${cfg.desc}</span>
        <span class="prio-count">${grupo.length} cuentas · $${total.toLocaleString('es-MX',{minimumFractionDigits:0})}</span>
      </div>
      ${renderTabla(grupo)}
    </div>`;
  });

  if (!html) html = '<p class="empty">Sin cuentas para este gestor.</p>';
  document.getElementById('main-content').innerHTML = html;
  actualizarProgreso();
}

// Init
renderAll();
</script>
</body>
</html>
