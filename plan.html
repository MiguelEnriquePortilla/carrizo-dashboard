<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">

<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
  --text:#e8eaf2; --muted:#6b7280; --accent:#6366f1; --accent-dim:rgba(99,102,241,0.12);
  --green:#22c55e; --yellow:#f59e0b; --red:#ef4444; --orange:#f97316;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  --radius:10px; --touch:44px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;
  position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-tag{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.hdr-title{font-size:17px;font-weight:700}
.hdr-date{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;line-height:1.6}

/* KPI STRIP — 3 tarjetas iguales, sin scroll */
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 16px;
  background:var(--surface);border-bottom:1px solid var(--border)}
.kpi{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 10px 8px}
.kpi-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}
.kpi-meta{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:3px;white-space:nowrap}

/* FILTER BAR */
.filter-bar{padding:10px 16px;display:flex;align-items:center;gap:8px;
  background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99}
.filter-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;white-space:nowrap}
.filter-btn{min-height:var(--touch);padding:0 18px;border-radius:22px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:12px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center}
.filter-btn:active{transform:scale(.96)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.progress{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.progress b{color:var(--green)}

/* MAIN */
.main{padding:14px 16px;max-width:900px;margin:0 auto}

/* PRIORITY BLOCK */
.prio-block{margin-bottom:20px}
.prio-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.prio-badge{font-family:var(--mono);font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:6px;letter-spacing:1px}
.prio-badge.P1{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.prio-badge.P2{background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.3)}
.prio-badge.P3{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.prio-badge.P4{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.prio-title{font-size:13px;font-weight:700}
.prio-desc{font-size:11px;color:var(--muted)}
.prio-count{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}

/* CARDS (reemplaza tabla en móvil) */
.cards{display:flex;flex-direction:column;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;transition:border-color .15s}
.card.done{opacity:.5;border-color:var(--border)}
.card.done .card-name{text-decoration:line-through;color:var(--muted)}
.card-top{display:flex;align-items:flex-start;gap:12px}
.card-chk{width:22px;height:22px;min-width:22px;accent-color:var(--accent);
  cursor:pointer;margin-top:2px}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:6px;
  word-break:break-word}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-saldo{font-family:var(--mono);font-size:13px;color:#a5b4fc;font-weight:500}
.card-ts{font-family:var(--mono);font-size:10px;color:var(--green);margin-left:auto;white-space:nowrap}
.card-result{margin-top:10px;margin-left:34px}
.card-result input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;
  padding:10px 12px;transition:border .15s}
.card-result input:focus{outline:none;border-color:var(--accent)}
.card-result input::placeholder{color:var(--muted)}

/* TAGS */
.tag{display:inline-block;padding:3px 8px;border-radius:5px;
  font-family:var(--mono);font-size:10px;font-weight:600;white-space:nowrap}
.tag-hoy{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.tag-rota{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.tag-si{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
.tag-no{background:rgba(107,114,128,.1);color:var(--muted);border:1px solid var(--border)}
.tag-mora{background:rgba(249,115,22,.1);color:#f97316;border:1px solid rgba(249,115,22,.3)}
.tag-gestor{background:rgba(99,102,241,.08);color:#818cf8;border:1px solid rgba(99,102,241,.2);font-size:9px}

.empty{text-align:center;padding:32px;color:var(--muted);font-family:var(--mono);font-size:12px}

footer{text-align:center;padding:20px 16px;font-family:var(--mono);font-size:10px;
  color:var(--muted);border-top:1px solid var(--border);letter-spacing:1px}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:57px;z-index:98}
.tab{flex:1;padding:12px;border:none;background:transparent;color:var(--muted);
  font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px}
.tab:active{background:var(--surface2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* AVANCES */
.av-section{margin-bottom:24px}
.av-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.av-title::after{content:'';flex:1;height:1px;background:var(--border)}
.av-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:10px}
.av-gestor{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.av-name{font-size:15px;font-weight:700}
.av-stat{font-family:var(--mono);font-size:13px;color:var(--muted)}
.av-stat b{color:var(--text)}
.bar-bg{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease}
.bar-label{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
.av-global{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.av-global-num{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--accent);line-height:1}
.av-global-label{font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:14px}
.rotas-card{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);
  border-radius:var(--radius);padding:16px}
.rotas-num{font-family:var(--mono);font-size:36px;font-weight:700;color:#ef4444;line-height:1}
.rotas-label{font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:12px}
.rota-item{font-size:12px;padding:6px 0;border-bottom:1px solid rgba(239,68,68,.15);
  display:flex;justify-content:space-between;align-items:center}
.rota-item:last-child{border-bottom:none}
.rota-nombre{font-weight:500;flex:1;margin-right:8px}
.rota-gestor{font-family:var(--mono);font-size:10px;color:#f97316;
  background:rgba(249,115,22,.1);padding:2px 8px;border-radius:4px}

@media(max-width:699px){
  .tabs{top:53px}
}

@media(min-width:700px){
  .cards{display:none}
  .dtable{display:table;width:100%;border-collapse:collapse}
  .dtable thead tr{border-bottom:1px solid var(--border)}
  .dtable th{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);padding:8px 12px;text-align:left;font-weight:500}
  .dtable tbody tr{border-bottom:1px solid rgba(46,51,80,.5);transition:background .1s}
  .dtable tbody tr:hover{background:var(--accent-dim)}
  .dtable tbody tr.done{opacity:.45}
  .dtable tbody tr.done .td-name{text-decoration:line-through;color:var(--muted)}
  .dtable td{padding:10px 12px;vertical-align:middle}
  .td-name{font-weight:500;font-size:13px}
  .td-saldo{font-family:var(--mono);font-size:12px;color:#a5b4fc}
  .td-mora{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .visit-cell{display:flex;align-items:center;gap:8px}
  .dt-chk{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .dt-result{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-family:var(--sans);font-size:12px;padding:5px 10px;width:200px;transition:border .15s}
  .dt-result:focus{outline:none;border-color:var(--accent)}
  .dt-result::placeholder{color:var(--muted)}
  .dt-ts{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
  .filter-bar{top:61px}
}
@media(max-width:699px){
  .dtable{display:none}
  .hdr{top:0}
  .filter-bar{top:53px}
}
</style>
</head>

sa": "ROTA", "prioridad": "P1", "sub": "ROTA"}, {"id": 35, "gestor": "GPR65 JOSE EDUARDO MORALES ZAMORA", "nombre": "ESMERALDA CARBAJAL CASTILLO", "saldo": 4993.13, "mora": 52, "promesa": "ROTA", "prioridad": "P1", "sub": "ROTA"}, {"id": 36, "gestor": "GPR65 GERARDO ANDA RIOS", "nombre": "SERGIO GUADALUPE LIZAMA WIDALES", "saldo": 2622.4, "mora": 33, "promesa": "SI", "prioridad": "P1", "sub": "PROMESA HOY"}, {"id": 37, "gestor": "GPR65 GERARDO ANDA RIOS", "nombre": "ARMANDO HERNANDEZ PADILLA", "saldo": 9650.12, "mora": 56, "promesa": "", "prioridad": "P1", "sub": "56d"}, {"id": 38, "gestor": "GPR65 JOSE EDUARDO MORALES ZAMORA", "nombre": "ISRAEL LOPEZ RODRIGUEZ", "saldo": 2087.23, "mora": 39, "promesa": "SI", "prioridad": "P1", "sub": "39d"}, {"id": 39, "gestor": "GPR65 JOSE EDUARDO MORALES ZAMORA", "nombre": "ROSA MARIA IBARRA GARZA", "saldo": 3511.62, "mora": 33, "promesa": "SI", "prioridad": "P1", "sub": "33d"}, {"id": 40, "gestor": "GPR65 GERARDO ANDA RIOS", "nombre": "EVANGELINA CONTRERAS GAMEZ", "saldo": 2158.22, "mora": 36, "promesa": "ROTA", "prioridad": "P1", "sub": "ROTA"}, {"id": 41, "gestor": "GPR65 GERARDO ANDA RIOS", "nombre": "JOSE GABRIEL GONZALEZ HINOJOSA", "saldo": 6687.76, "mora": 52, "promesa": "ROTA", "prioridad": "P1", "sub": "ROTA"}, {"id": 42, "gestor": "GPR65 JOSE EDUARDO MORALES ZAMORA", "nombre": "AMERICO FLORENTINO HERNANDEZ QUINTERO", "saldo": 8934.24, "mora": 38, "promesa": "ROTA", "prioridad": "P1", "sub": "ROTA"}, {"id": 43, "gestor": "GPR65 JOSE EDUARDO MORALES ZAMORA", "nombre": "GUADALUPE MARTINEZ SALAZAR", "saldo": 6470.23, "mora": 31, "promesa": "", "prioridad": "P1", "sub": "31d"}, {"id": 44, "gestor": "GPR65 GERARDO ANDA RIOS", "nombre": "ROSA IRMA DUARTE SANDOVAL", "saldo": 7180.99, "mora": 43, "promesa": "", "prioridad": "P1", "sub": "43d"}];
const KEY  = 'carrizo_20260602';
const PCFG = {
  P1:{title:'COBRO INMEDIATO', desc:'31-60d · Promesas hoy · Rotas'},
  P2:{title:'PROMESAR HOY',    desc:'22-30 días'},
  P3:{title:'PRÓXIMA SEMANA',  desc:'15-21 días'},
  P4:{title:'GESTIÓN TEMPRANA',desc:'8-14 días'},
};

let estado = {};
try { estado = JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e){}
let filtro = 'todos';

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(estado)); } catch(e){}
  const t = new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  const el = document.getElementById('last-save');
  if(el) el.textContent = '✓ ' + t;
  updateProg();
  if(document.getElementById('view-avances').style.display !== 'none') renderAvances();
}

function updateProg() {
  const vis = DATA.filter(r => filtro==='todos' || r.gestor.toLowerCase().includes(filtro));
  const done = vis.filter(r => estado[r.id]?.v).length;
  document.getElementById('prog').innerHTML = `Visitadas: <b>${done}</b>/${vis.length}`;
}

function tagSub(sub) {
  if(sub==='PROMESA HOY') return '<span class="tag tag-hoy">✅ HOY</span>';
  if(sub==='ROTA')        return '<span class="tag tag-rota">⚠ ROTA</span>';
  return `<span class="tag tag-mora">${sub}</span>`;
}
function tagProm(p) {
  if(p==='ROTA') return '<span class="tag tag-rota">ROTA</span>';
  if(p==='SI')   return '<span class="tag tag-si">✓ Promesa</span>';
  return '<span class="tag tag-no">Sin promesa</span>';
}

function toggleV(id, chk) {
  if(!estado[id]) estado[id]={};
  estado[id].v = chk;
  estado[id].ts = chk ? new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) : null;
  // update card
  ['card','drow'].forEach(prefix => {
    const el = document.getElementById(prefix+'-'+id);
    if(!el) return;
    el.className = el.className.replace(' done','') + (chk?' done':'');
  });
  // update ts labels
  document.querySelectorAll('.ts-'+id).forEach(el => el.textContent = chk?(estado[id].ts||''):'');
  save();
}

function saveRes(id, val) {
  if(!estado[id]) estado[id]={};
  estado[id].r = val;
  save();
}

function renderCards(datos) {
  if(!datos.length) return '<p class="empty">Sin cuentas en este rango.</p>';
  return '<div class="cards">' + datos.map(r => {
    const s   = estado[r.id]||{};
    const chk = s.v?'checked':'';
    const res = s.r||'';
    const ts  = s.ts||'';
    const gestorTag = filtro==='todos' ? `<span class="tag tag-gestor">${r.gestor.split(' ')[0]}</span>` : '';
    return `<div class="card${s.v?' done':''}" id="card-${r.id}">
      <div class="card-top">
        <input type="checkbox" class="card-chk" ${chk} onchange="toggleV(${r.id},this.checked)">
        <div class="card-info">
          <div class="card-name">${r.nombre}</div>
          <div class="card-meta">
            <span class="card-saldo">$${r.saldo.toLocaleString('es-MX',{minimumFractionDigits:0})}</span>
            ${tagSub(r.sub)} ${tagProm(r.promesa)} ${gestorTag}
            <span class="card-ts ts-${r.id}">${ts}</span>
          </div>
        </div>
      </div>
      <div class="card-result">
        <input type="text" placeholder="Resultado de la gestión..." value="${res}"
          oninput="saveRes(${r.id},this.value)">
      </div>
    </div>`;
  }).join('') + '</div>';
}

function renderTable(datos) {
  if(!datos.length) return '<p class="empty">Sin cuentas en este rango.</p>';
  const gestorCol = filtro==='todos';
  return `<table class="dtable">
    <thead><tr>
      <th>Cliente</th><th>Saldo</th><th>Mora</th><th>Estado</th>
      ${gestorCol?'<th>Gestor</th>':''}
      <th>Visitado / Resultado</th>
    </tr></thead>
    <tbody>${datos.map(r=>{
      const s=estado[r.id]||{};
      const chk=s.v?'checked':'';
      const res=s.r||'';
      const ts=s.ts||'';
      return `<tr class="${s.v?'done':''}" id="drow-${r.id}">
        <td class="td-name">${r.nombre}</td>
        <td class="td-saldo">$${r.saldo.toLocaleString('es-MX',{minimumFractionDigits:0})}</td>
        <td class="td-mora">${r.mora}d</td>
        <td>${tagSub(r.sub)} ${tagProm(r.promesa)}</td>
        ${gestorCol?`<td style="font-size:11px;color:var(--muted)">${r.gestor.split(' ')[0]}</td>`:''}
        <td><div class="visit-cell">
          <input type="checkbox" class="dt-chk" ${chk} onchange="toggleV(${r.id},this.checked)">
          <input type="text" class="dt-result" placeholder="Resultado..." value="${res}"
            oninput="saveRes(${r.id},this.value)">
          <span class="dt-ts ts-${r.id}">${ts}</span>
        </div></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function filtrar(g, btn) {
  filtro = g;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}

function render() {
  const fd = filtro==='todos' ? DATA : DATA.filter(r=>r.gestor.toLowerCase().includes(filtro));
  let html = '';
  ['P1','P2','P3','P4'].forEach(p=>{
    const g = fd.filter(r=>r.prioridad===p);
    if(!g.length) return;
    const tot = g.reduce((s,r)=>s+r.saldo,0);
    const cfg = PCFG[p];
    html += `<div class="prio-block">
      <div class="prio-header">
        <span class="prio-badge ${p}">${p}</span>
        <span class="prio-title">${cfg.title}</span>
        <span class="prio-desc">${cfg.desc}</span>
        <span class="prio-count">${g.length} · $${tot.toLocaleString('es-MX',{minimumFractionDigits:0})}</span>
      </div>
      ${renderCards(g)}
      ${renderTable(g)}
    </div>`;
  });
  document.getElementById('main').innerHTML = html || '<p class="empty">Sin cuentas.</p>';
  updateProg();
}

function renderAvances() {
  const rotasPendientes = DATA.filter(r => r.sub === 'ROTA' && !estado[r.id]?.v);
  const gestores = ['Eduardo','Gerardo'];
  let gestoresHTML = '';
  gestores.forEach(g => {
    const gl    = g.toLowerCase();
    const total = DATA.filter(r => r.gestor.toLowerCase().includes(gl)).length;
    const done  = DATA.filter(r => r.gestor.toLowerCase().includes(gl) && estado[r.id]?.v).length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const color = pct >= 70 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444';
    gestoresHTML += `<div class="av-card">
      <div class="av-gestor">
        <span class="av-name">${g}</span>
        <span class="av-stat"><b>${done}</b> / ${total} visitadas</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="bar-label"><span>${pct}% completado</span><span>${total-done} pendientes</span></div>
    </div>`;
  });
  const totalG = DATA.length;
  const doneG  = DATA.filter(r => estado[r.id]?.v).length;
  const pctG   = totalG ? Math.round(doneG/totalG*100) : 0;
  const colorG = pctG >= 70 ? '#22c55e' : pctG >= 40 ? '#f59e0b' : '#ef4444';
  const rotasHTML = rotasPendientes.length
    ? rotasPendientes.map(r => `<div class="rota-item">
        <span class="rota-nombre">${r.nombre}</span>
        <span class="rota-gestor">${r.gestor.split(' ')[0]}</span>
      </div>`).join('')
    : '<p style="font-size:12px;color:var(--green);padding:8px 0">✅ Todas resueltas</p>';
  document.getElementById('avances-content').innerHTML = `
    <div class="av-global">
      <div class="av-global-num">${pctG}%</div>
      <div class="av-global-label">del plan completado · ${doneG} de ${totalG} cuentas visitadas</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pctG}%;background:${colorG}"></div></div>
    </div>
    <div class="av-section">
      <div class="av-title">Por gestor</div>
      ${gestoresHTML}
    </div>
    <div class="av-section">
      <div class="av-title">Promesas rotas pendientes</div>
      <div class="rotas-card">
        <div class="rotas-num">${rotasPendientes.length}</div>
        <div class="rotas-label">sin resolver hoy</div>
        ${rotasHTML}
      </div>
    </div>`;
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-plan').style.display    = tab==='plan'    ? '' : 'none';
  document.getElementById('view-avances').style.display = tab==='avances' ? '' : 'none';
  if(tab==='avances') renderAvances();
}

render();
</script>
</body>
</html>
